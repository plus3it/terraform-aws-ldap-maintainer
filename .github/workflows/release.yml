name: Create GitHub Release

on:
  # Run on demand
  workflow_dispatch:

  # Run on push to main when .bumpversion.cfg version is updated
  push:
    branches:
      - master
    paths:
      - .bumpversion.cfg

jobs:
  release:
    uses: plus3it/actions-workflows/.github/workflows/release.yml@0a03f75193a010b3532cc90e8ad0b15a09ed33c1
    with:
      mockstacktest-enable: false
    secrets:
      release-token: ${{ secrets.GH_RELEASES_TOKEN }}
